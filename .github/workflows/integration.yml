name: Integration Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Stage 2 Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: redline
          POSTGRES_PASSWORD: redline_test
          POSTGRES_DB: redline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U redline"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://redline:redline_test@localhost:5432/redline_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e ".[dev]"

      - name: Run Stage 2 integration tests
        run: pytest tests/test_stage2_flow.py -v
