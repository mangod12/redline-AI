name: Deploy to Google Cloud Run

on:
  # Auto-deploy after CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: redline-ai
  ARTIFACT_REGISTRY: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev

jobs:
  preflight:
    name: Validate Deploy Configuration
    runs-on: ubuntu-latest
    # Skip if CI workflow failed (only applies to workflow_run trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      deploy_enabled: ${{ steps.check.outputs.deploy_enabled }}
    steps:
      - id: check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$GCP_PROJECT_ID" ] && [ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] && [ -n "$GCP_SERVICE_ACCOUNT" ]; then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
            echo "✅ GCP deploy secrets are configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping deploy: missing one or more required secrets (GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT)." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Build & Push ──────────────────────────────────────────────────
  build:
    name: Build & Push to Artifact Registry
    needs: preflight
    if: ${{ needs.preflight.outputs.deploy_enabled == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - id: meta
        name: Build image tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="${ARTIFACT_REGISTRY}/${PROJECT_ID}/redline-ai/${SERVICE_NAME}:${SHA::8}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/redline-ai/${{ env.SERVICE_NAME }}:latest

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [preflight, build]
    if: ${{ needs.preflight.outputs.deploy_enabled == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/redline-ai/${{ env.SERVICE_NAME }}:latest
          region: ${{ env.REGION }}
          flags: |
            --port=8000
            --memory=4Gi
            --cpu=2
            --min-instances=0
            --max-instances=10
            --timeout=600
            --allow-unauthenticated
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:redline-db
          env_vars: |
            APP_ENV=production
            USE_SQLITE=false
            ENABLE_DOCS=false
            CLOUD_SQL_CONNECTION_NAME=${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:redline-db
            ALLOWED_ORIGIN=https://redline-ai-359883234654.us-central1.run.app
            WHISPER_MODEL_SIZE=tiny
            GUNICORN_WORKERS=1
          secrets: |
            SECRET_KEY=SECRET_KEY:latest
            TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest
            POSTGRES_PASSWORD=POSTGRES_PASSWORD:latest
            POSTGRES_USER=POSTGRES_USER:latest
            POSTGRES_DB=POSTGRES_DB:latest

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "## Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/redline-ai/${{ env.SERVICE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
