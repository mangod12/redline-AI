apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redline-ai-ingress
  labels:
    app: redline-ai
  annotations:
    # SSL
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Rate limiting at ingress
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Timeouts (Whisper STT can take 30s+)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: redline-ai
    # Body size for audio uploads (25MB max)
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    # Security headers (defense in depth — app also sets them)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dispatch.redline.ai
      secretName: redline-ai-tls
  rules:
    - host: dispatch.redline.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redline-ai
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: redline-ai
                port:
                  number: 80
